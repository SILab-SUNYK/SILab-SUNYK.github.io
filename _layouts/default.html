<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}SIL</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <script>try{if(localStorage.getItem('sil-theme')!=='light')document.documentElement.dataset.theme='dark'}catch(e){document.documentElement.dataset.theme='dark'}</script>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/publications.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/theme.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/home-images.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/news.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/team.css' | relative_url }}">
</head>
<body>
  {% include header.html %}
  <main>{{ content }}</main>
  <footer class="site-footer wrap"><div><b>SIL</b><span>Spatial Intelligence Lab</span></div><p>Machines that understand space.</p><div><a href="mailto:francoisbernar.rameau@stonybrook.edu">Contact ↗</a><small>SUNY Korea · Stony Brook University</small></div></footer>
  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
</body>
</html>
